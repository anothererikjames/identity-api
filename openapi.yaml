openapi: 3.1.0
info:
  title: Identity API
  version: "1.4.2"
  description: Authentication and user management service for the Acme platform.
  contact:
    name: Identity Team
    email: identity-team@acme.io
    url: https://wiki.acme.io/teams/identity

servers:
  - url: https://api.acme.io/identity/v1
    description: Production
  - url: https://dev-api.acme.io/identity/v1
    description: Development

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication operations
  - name: users
    description: User management

paths:
  /auth/login:
    post:
      operationId: loginUser
      summary: Authenticate a user and issue tokens
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@acme.io
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh an access token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Refresh token expired or invalid

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Invalidate the current session
      tags: [auth]
      responses:
        "204":
          description: Session invalidated

  /users/{userId}:
    get:
      operationId: getUser
      summary: Retrieve a user by ID
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    patch:
      operationId: updateUser
      summary: Update user profile fields
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      summary: Soft-delete a user account
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted

  /users:
    post:
      operationId: createUser
      summary: Create a new user account
      tags: [users]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Email already in use

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 3600

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, member, viewer]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreate:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    UserPatch:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, member, viewer]

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
