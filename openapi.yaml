openapi: 3.0.3
info:
  title: Identity API
  description: Authentication, authorization, and identity management for Acme Corp services
  version: 4.2.1
  contact:
    name: Platform Team
    email: platform@acme.com
  x-domain: identity
  x-tier: critical
servers:
  - url: https://identity.api.example.com/v1
    description: Production
  - url: https://identity-dev.api.example.com/v1
    description: Development
tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: tokens
    description: Token management
  - name: roles
    description: Role-based access control
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [auth]
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string, example: 4.2.1 }
                  uptime: { type: number, example: 2592000 }
  /auth/login:
    post:
      summary: Authenticate user
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                mfa_token: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      summary: Invalidate session
      operationId: logout
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out
  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      tags: [tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /users:
    get:
      summary: List users
      operationId: listUsers
      tags: [users]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: role
          in: query
          schema: { type: string }
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  total: { type: integer }
                  page: { type: integer }
    post:
      summary: Create user
      operationId: createUser
      tags: [users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{userId}:
    get:
      summary: Get user
      operationId: getUser
      tags: [users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update user
      operationId: updateUser
      tags: [users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                roles: { type: array, items: { type: string } }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /roles:
    get:
      summary: List roles
      operationId: listRoles
      tags: [roles]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items: { $ref: '#/components/schemas/Role' }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, example: 3600 }
        token_type: { type: string, example: Bearer }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        roles: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }
        last_login: { type: string, format: date-time }
        mfa_enabled: { type: boolean }
    CreateUserRequest:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, format: password }
        roles: { type: array, items: { type: string } }
    Role:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        permissions: { type: array, items: { type: string } }
        description: { type: string }
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              message: { type: string }
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              message: { type: string }
