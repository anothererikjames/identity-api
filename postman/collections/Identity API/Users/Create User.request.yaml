$kind: http-request
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{newUserEmail}}",
      "password": "Acme@Secure123!",
      "name": "Test User"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status is 201", () => pm.response.to.have.status(201));

      pm.test("Returns user object with id", () => {
        const body = pm.response.json();
        pm.expect(body.id).to.be.a('string');
        pm.environment.set('userId', body.id);
      });

      pm.test("Email matches request", () => {
        pm.expect(pm.response.json().email).to.equal(pm.variables.get('newUserEmail'));
      });
  - type: beforeRequest
    code: pm.variables.set('newUserEmail', `test-${Date.now()}@acme.io`);
order: 1000
