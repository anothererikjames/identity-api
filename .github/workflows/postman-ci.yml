name: Postman Collection Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Identity API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run collection (Production spec)
        env:
          BASE_URL: ${{ secrets.IDENTITY_API_BASE_URL }}
          TEST_EMAIL: ${{ secrets.IDENTITY_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.IDENTITY_TEST_PASSWORD }}
        run: |
          newman run "postman/collections/Identity API.postman_collection.json" \
            --environment "postman/environments/production.postman_environment.json" \
            --env-var "baseUrl=${BASE_URL}" \
            --env-var "testEmail=${TEST_EMAIL}" \
            --env-var "testPassword=${TEST_PASSWORD}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/identity-api-results.html \
            --bail

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-api-test-report
          path: reports/
